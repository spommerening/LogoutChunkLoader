image: eclipse-temurin:21-jdk

stages:
  - build
  - release

build:
  stage: build
  script:
    - chmod +x gradlew
    - ./gradlew jar
  artifacts:
    paths:
      - build/libs/LogoutChunkLoader-*.jar
    expire_in: 1 hour
  cache:
    key: gradle-$CI_COMMIT_REF_SLUG
    paths:
      - .gradle/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build]
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file "$(ls build/libs/LogoutChunkLoader-*.jar | head -1)" \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/logoutchunkloader/${CI_COMMIT_TAG}/LogoutChunkLoader-${CI_COMMIT_TAG}.jar"
  release:
    name: "LogoutChunkLoader $CI_COMMIT_TAG"
    tag_name: $CI_COMMIT_TAG
    assets:
      links:
        - name: "LogoutChunkLoader-$CI_COMMIT_TAG.jar"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/logoutchunkloader/$CI_COMMIT_TAG/LogoutChunkLoader-$CI_COMMIT_TAG.jar"
          link_type: package
